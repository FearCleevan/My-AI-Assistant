<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<title>My AI Assistant</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--vscode-font-family, 'Segoe UI', Arial, sans-serif);
  font-size:   var(--vscode-font-size, 13px);
  background:  var(--vscode-editor-background, #1e1e2e);
  color:       var(--vscode-editor-foreground, #cdd6f4);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Status bar ─────────────────────────────────────────── */
#status-bar {
  padding: 4px 10px;
  font-size: 11px;
  border-bottom: 1px solid var(--vscode-panel-border, #313244);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 26px;
  flex-shrink: 0;
}
#status-dot { width:8px; height:8px; border-radius:50%; background:#f38ba8; flex-shrink:0; }
#status-dot.ok { background:#a6e3a1; }
#status-text { color: var(--vscode-descriptionForeground, #6c7086); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#reconnect-btn {
  background:none; border:1px solid #45475a; color:#6c7086;
  border-radius:3px; padding:1px 7px; font-size:10px; cursor:pointer;
  flex-shrink:0; display:none;
}
#reconnect-btn:hover { border-color:#89b4fa; color:#89b4fa; }

/* ── Topic / file bar ───────────────────────────────────── */
#context-bar {
  padding: 4px 10px;
  font-size: 11px;
  border-bottom: 1px solid var(--vscode-panel-border, #313244);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
  min-height: 26px;
}
#topic-input {
  flex: 1;
  background: var(--vscode-input-background, #313244);
  border: 1px solid var(--vscode-input-border, #45475a);
  color: var(--vscode-input-foreground, #cdd6f4);
  border-radius: 3px;
  padding: 2px 6px;
  font-size: 11px;
  font-family: inherit;
}
#file-badge {
  color: var(--vscode-descriptionForeground, #6c7086);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

/* ── Chat messages ──────────────────────────────────────── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: #45475a; border-radius:3px; }

.msg { display:flex; flex-direction:column; gap:4px; }
.msg-label { font-size:11px; font-weight:700; letter-spacing:0.5px; }
.msg-label.user { color:#89b4fa; }
.msg-label.ai   { color:#a6e3a1; }
.msg-bubble { padding:8px 12px; border-radius:6px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
.msg-bubble.user { background:#1e2a3a; border-left:3px solid #89b4fa; color:#cdd6f4; }
.msg-bubble.ai   { background:transparent; color:#cdd6f4; }

/* Attached file tags inside user bubble */
.msg-attached { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
.msg-tag {
  display:inline-flex; align-items:center; gap:4px;
  background:#2a2a45; border:1px solid #45475a;
  border-radius:4px; padding:1px 6px;
  font-size:11px; color:#89b4fa;
}
.msg-tag-icon { font-size:10px; opacity:0.8; }

/* ── Code blocks ────────────────────────────────────────── */
.code-block { margin:8px 0; border:1px solid #45475a; border-radius:6px; overflow:hidden; }
.code-header { display:flex; justify-content:space-between; align-items:center; padding:4px 12px; background:#1e1e38; font-size:11px; font-family:Consolas,monospace; }
.code-lang { color:#6c7086; }
.code-copy { color:#89b4fa; cursor:pointer; border:none; background:none; font-size:11px; font-family:inherit; padding:0; }
.code-copy:hover { text-decoration:underline; }
.code-body { background:#12121f; padding:12px 14px; overflow-x:auto; }
.code-body pre { margin:0; font-family:Consolas,'Courier New',monospace; font-size:12px; line-height:1.5; color:#f8f8f2; white-space:pre; }

/* ── Sources ────────────────────────────────────────────── */
.sources { font-size:11px; color:#6c7086; margin-top:4px; }
.sources a { color:#89b4fa; text-decoration:none; }
.sources a:hover { text-decoration:underline; }

/* ── Cursor ─────────────────────────────────────────────── */
.cursor::after { content:'\25ae'; animation:blink 0.7s step-end infinite; color:#a6e3a1; }
@keyframes blink { 50% { opacity:0; } }

/* ── Input area ─────────────────────────────────────────── */
#input-wrap {
  border-top: 1px solid var(--vscode-panel-border, #313244);
  flex-shrink: 0;
  position: relative;
}

/* Attached file chips */
#chips {
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 10px 0;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #2a2a45;
  border: 1px solid #6363a0;
  border-radius: 12px;
  padding: 2px 8px 2px 6px;
  font-size: 11px;
  color: #cba6f7;
  max-width: 200px;
}
.chip-icon { font-size:12px; flex-shrink:0; }
.chip-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chip-remove {
  cursor: pointer;
  color: #6c7086;
  font-size: 13px;
  line-height: 1;
  flex-shrink: 0;
  border: none;
  background: none;
  padding: 0;
}
.chip-remove:hover { color: #f38ba8; }

/* @ file picker popup */
#file-picker {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 10px;
  right: 10px;
  background: var(--vscode-dropdown-background, #1e1e38);
  border: 1px solid var(--vscode-focusBorder, #6363a0);
  border-radius: 6px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  z-index: 100;
  max-height: 260px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#file-picker.open { display:flex; }

#picker-search {
  padding: 6px 8px;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}
#picker-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--vscode-input-foreground, #cdd6f4);
  font-size: 12px;
  font-family: inherit;
}

#picker-hint {
  padding: 3px 8px;
  font-size: 10px;
  color: #6c7086;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}

#picker-list {
  overflow-y: auto;
  flex: 1;
}
#picker-list::-webkit-scrollbar { width:4px; }
#picker-list::-webkit-scrollbar-thumb { background:#45475a; border-radius:2px; }

.picker-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 12px;
  -webkit-user-select: none;
  user-select: none;
}
.picker-item:hover, .picker-item.active { background: #313250; }
.picker-item-icon { font-size:13px; flex-shrink:0; }
.picker-item-name { color:#cdd6f4; flex-shrink:0; }
.picker-item-path { color:#6c7086; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:11px; }
.picker-empty { padding:12px; text-align:center; color:#6c7086; font-size:12px; }

/* Input row */
#input-area { padding:8px 10px; display:flex; gap:6px; align-items:flex-end; }
#user-input {
  flex:1; background:var(--vscode-input-background,#313244);
  border:1px solid var(--vscode-input-border,#45475a);
  color:var(--vscode-input-foreground,#cdd6f4);
  border-radius:4px; padding:6px 8px; font-size:13px; font-family:inherit;
  resize:none; min-height:36px; max-height:120px; line-height:1.4; outline:none;
}
#user-input:focus { border-color:var(--vscode-focusBorder,#89b4fa); }
#send-btn {
  background:var(--vscode-button-background,#89b4fa);
  color:var(--vscode-button-foreground,#1e1e2e);
  border:none; border-radius:4px; padding:6px 14px;
  font-weight:bold; cursor:pointer; font-size:13px; align-self:flex-end; height:36px;
}
#send-btn:hover { opacity:0.9; }
#send-btn:disabled { opacity:0.5; cursor:not-allowed; }
#clear-btn {
  background:none; border:1px solid #45475a; color:#6c7086;
  border-radius:4px; padding:6px 8px; cursor:pointer; font-size:11px;
  align-self:flex-end; height:36px;
}
#clear-btn:hover { border-color:#89b4fa; color:#cdd6f4; }

/* @ hint below input */
#at-hint { padding:0 10px 5px; font-size:10px; color:#45475a; }
.at-key      { color:#89b4fa; }
.topic-label { color:#6c7086; font-size:11px; }

/* ── File proposal cards (Phase 6) ─────────────────────────────────────── */
.file-proposal {
  margin: 10px 0 4px;
  border: 1px solid #6363a0;
  border-radius: 8px;
  overflow: hidden;
  background: #1a1a2e;
}
.proposal-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  background: #252540;
  border-bottom: 1px solid #45475a;
  font-size: 12px;
}
.proposal-icon  { font-size:14px; flex-shrink:0; }
.proposal-path  { color:#cba6f7; font-family:Consolas,monospace; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.proposal-badge {
  font-size:10px; font-weight:700; letter-spacing:.5px;
  padding:1px 6px; border-radius:10px; flex-shrink:0;
}
.proposal-badge.new  { background:#a6e3a120; color:#a6e3a1; border:1px solid #a6e3a155; }
.proposal-badge.edit { background:#89b4fa20; color:#89b4fa; border:1px solid #89b4fa55; }

.proposal-preview {
  margin:0; padding:10px 14px;
  font-family:Consolas,'Courier New',monospace;
  font-size:11px; line-height:1.5; color:#cdd6f4;
  background:#12121f; overflow-x:auto;
  max-height:180px; overflow-y:auto;
  border-bottom:1px solid #313244;
  white-space:pre;
}
.proposal-preview::-webkit-scrollbar { width:4px; height:4px; }
.proposal-preview::-webkit-scrollbar-thumb { background:#45475a; border-radius:2px; }

.proposal-actions {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: #1e1e38;
}
.btn-accept {
  background:#a6e3a1; color:#1e1e2e; border:none; border-radius:4px;
  padding:4px 14px; font-size:12px; font-weight:700; cursor:pointer;
}
.btn-accept:hover { opacity:.85; }
.btn-accept:disabled { opacity:.4; cursor:not-allowed; }
.btn-diff {
  background:transparent; color:#89b4fa;
  border:1px solid #89b4fa55; border-radius:4px;
  padding:4px 12px; font-size:12px; cursor:pointer;
}
.btn-diff:hover { background:#89b4fa18; }
.btn-reject {
  background:transparent; color:#f38ba8;
  border:1px solid #f38ba855; border-radius:4px;
  padding:4px 12px; font-size:12px; cursor:pointer;
  margin-left:auto;
}
.btn-reject:hover { background:#f38ba818; }
.proposal-status {
  font-size:11px; padding:4px 12px 6px;
  display:flex; align-items:center; gap:5px;
}
.proposal-status.accepted { color:#a6e3a1; }
.proposal-status.rejected { color:#6c7086; }
.proposal-status.error    { color:#f38ba8; }
</style>
</head>
<body>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Connecting to My AI server&#8230;</span>
  <button type="button" id="reconnect-btn" title="Retry connection">&#8635; Retry</button>
</div>

<div id="context-bar">
  <span class="topic-label">Topic:</span>
  <input id="topic-input" placeholder="react, project:my-app, ... (blank = general)" />
  <span id="file-badge">no file open</span>
</div>

<div id="chat"></div>

<div id="input-wrap">

  <!-- @ file picker popup (shown above input) -->
  <div id="file-picker">
    <div id="picker-search">
      <input id="picker-input" placeholder="Type to filter files..." autocomplete="off" spellcheck="false" />
    </div>
    <div id="picker-hint">&#8593;&#8595; navigate &nbsp;&#9166; select &nbsp;Esc close</div>
    <div id="picker-list"></div>
  </div>

  <!-- Attached file chips -->
  <div id="chips"></div>

  <!-- Input row -->
  <div id="input-area">
    <textarea id="user-input" rows="1"
      placeholder="Ask anything... (Ctrl+Enter to send, @ to attach files)"></textarea>
    <button type="button" id="clear-btn" title="Clear conversation">Clear</button>
    <button type="button" id="send-btn">Send</button>
  </div>
  <div id="at-hint">Type <span class="at-key">@</span> to attach a file from your workspace</div>
</div>

<script>
var vscode = acquireVsCodeApi();

// DOM
var chatEl      = document.getElementById('chat');
var inputEl     = document.getElementById('user-input');
var sendBtn     = document.getElementById('send-btn');
var clearBtn    = document.getElementById('clear-btn');
var topicInput  = document.getElementById('topic-input');
var fileBadge   = document.getElementById('file-badge');
var statusDot   = document.getElementById('status-dot');
var statusText  = document.getElementById('status-text');
var chipsEl     = document.getElementById('chips');
var pickerEl    = document.getElementById('file-picker');
var pickerInput = document.getElementById('picker-input');
var pickerList  = document.getElementById('picker-list');

// State
var currentAiBubble  = null;
var streamingRawText = '';
var allFiles         = [];      // [{name, relPath, absPath, ext}]
var filteredFiles    = [];
var pickerActive     = -1;      // selected index in picker
var attachedFiles    = [];      // [{name, relPath, absPath, ext}]
var pickerOpen       = false;
var atStartPos       = -1;      // cursor pos where @ was typed

// ── File icon by extension ────────────────────────────────────────────────────

function fileIcon(ext) {
  var icons = {
    js:'🟨', ts:'🔷', tsx:'🔷', jsx:'🟨',
    py:'🐍', php:'🐘', rb:'💎', go:'🐹', rs:'🦀',
    java:'☕', kt:'🔷', swift:'🍎',
    html:'🌐', css:'🎨', scss:'🎨', sass:'🎨',
    json:'📋', yaml:'📋', yml:'📋', toml:'📋', xml:'📋',
    md:'📝', mdx:'📝', txt:'📄',
    sql:'🗄️', graphql:'◼',
    sh:'🖥️', bash:'🖥️', zsh:'🖥️', ps1:'🖥️',
    dockerfile:'🐳', env:'⚙️',
    vue:'💚', svelte:'🟠',
  };
  return icons[ext] || '📄';
}

// ── File picker ───────────────────────────────────────────────────────────────

function openPicker() {
  if (!pickerOpen) {
    pickerOpen = true;
    pickerEl.classList.add('open');
    pickerInput.value = '';
    pickerActive = -1;
    // Request files from extension if not loaded yet
    if (allFiles.length === 0) {
      pickerList.innerHTML = '<div class="picker-empty">Loading files...</div>';
      vscode.postMessage({ type: 'getFiles' });
    } else {
      renderPicker('');
    }
    pickerInput.focus();
  }
}

function closePicker() {
  pickerOpen = false;
  pickerEl.classList.remove('open');
  pickerActive = -1;
  // Remove the @ that triggered the picker from the textarea
  if (atStartPos >= 0) {
    var val = inputEl.value;
    inputEl.value = val.slice(0, atStartPos) + val.slice(inputEl.selectionStart);
    atStartPos = -1;
  }
  inputEl.focus();
}

function renderPicker(query) {
  var q = query.toLowerCase().trim();
  filteredFiles = q
    ? allFiles.filter(function(f) {
        return f.relPath.toLowerCase().includes(q) || f.name.toLowerCase().includes(q);
      })
    : allFiles;

  if (filteredFiles.length === 0) {
    pickerList.innerHTML = '<div class="picker-empty">No files match "' + escHtml(query) + '"</div>';
    return;
  }

  var html = '';
  var show = filteredFiles.slice(0, 100);
  for (var i = 0; i < show.length; i++) {
    var f = show[i];
    var dir = f.relPath.includes('/') ? f.relPath.slice(0, f.relPath.lastIndexOf('/') + 1) : '';
    html +=
      '<div class="picker-item' + (i === pickerActive ? ' active' : '') +
      '" data-idx="' + i + '">' +
        '<span class="picker-item-icon">' + fileIcon(f.ext) + '</span>' +
        '<span class="picker-item-name">' + escHtml(f.name) + '</span>' +
        '<span class="picker-item-path">' + escHtml(dir) + '</span>' +
      '</div>';
  }
  pickerList.innerHTML = html;

  // Click handler
  pickerList.querySelectorAll('.picker-item').forEach(function(el) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var idx = parseInt(el.getAttribute('data-idx'));
      selectFile(filteredFiles[idx]);
    });
  });
}

function movePickerSelection(dir) {
  var max = Math.min(filteredFiles.length, 100) - 1;
  pickerActive = Math.max(0, Math.min(max, pickerActive + dir));
  renderPicker(pickerInput.value);
  // Scroll active item into view
  var activeEl = pickerList.querySelector('.picker-item.active');
  if (activeEl) { activeEl.scrollIntoView({ block: 'nearest' }); }
}

function selectFile(file) {
  // Don't attach duplicates
  if (attachedFiles.some(function(f) { return f.absPath === file.absPath; })) {
    closePicker();
    return;
  }
  attachedFiles.push(file);
  renderChips();
  closePicker();
}

// ── File chips ────────────────────────────────────────────────────────────────

function renderChips() {
  if (attachedFiles.length === 0) {
    chipsEl.style.display = 'none';
    chipsEl.innerHTML = '';
    return;
  }
  chipsEl.style.display = 'flex';
  var html = '';
  for (var i = 0; i < attachedFiles.length; i++) {
    var f = attachedFiles[i];
    html +=
      '<div class="chip" data-idx="' + i + '">' +
        '<span class="chip-icon">' + fileIcon(f.ext) + '</span>' +
        '<span class="chip-name">' + escHtml(f.name) + '</span>' +
        '<button class="chip-remove" title="Remove" data-idx="' + i + '">&#215;</button>' +
      '</div>';
  }
  chipsEl.innerHTML = html;
  chipsEl.querySelectorAll('.chip-remove').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(btn.getAttribute('data-idx'));
      attachedFiles.splice(idx, 1);
      renderChips();
    });
  });
}

// ── Textarea @ detection ──────────────────────────────────────────────────────

inputEl.addEventListener('keydown', function(e) {
  if (pickerOpen) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); movePickerSelection(1); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); movePickerSelection(-1); return; }
    if (e.key === 'Enter')      { e.preventDefault();
      if (pickerActive >= 0 && filteredFiles[pickerActive]) {
        selectFile(filteredFiles[pickerActive]);
      }
      return;
    }
    if (e.key === 'Escape')     { e.preventDefault(); closePicker(); return; }
  }
  if (e.key === 'Enter' && e.ctrlKey && !pickerOpen) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('keyup', function(e) {
  if (pickerOpen) { return; }
  // Detect @ symbol
  var val  = inputEl.value;
  var pos  = inputEl.selectionStart;
  var text = val.slice(0, pos);
  var match = text.match(/@([^\s@]*)$/);
  if (match && !pickerOpen) {
    atStartPos = pos - match[0].length;
    openPicker();
  }
});

// Picker search input
pickerInput.addEventListener('input', function() {
  pickerActive = 0;
  renderPicker(pickerInput.value);
});

pickerInput.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowDown')  { e.preventDefault(); movePickerSelection(1); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); movePickerSelection(-1); }
  if (e.key === 'Escape')     { e.preventDefault(); closePicker(); }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (pickerActive >= 0 && filteredFiles[pickerActive]) {
      selectFile(filteredFiles[pickerActive]);
    }
  }
});

// Auto-grow textarea
inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ── Phase 6: File proposal storage & rendering ───────────────────────────────

var proposalContents = {};   // id -> content string

function extractProposals(rawText) {
  var proposals   = [];
  var cleanedText = rawText;
  // Match <file_write path="...">...</file_write>  (greedy-free)
  var re = /<file_write\s+path="([^"]+)">([\s\S]*?)<\/file_write>/g;
  var match;
  var replaced = [];
  while ((match = re.exec(rawText)) !== null) {
    var id      = 'fp_' + Math.random().toString(36).slice(2, 9);
    var fpath   = match[1];
    var content = match[2].replace(/^\n/, '').replace(/\n$/, '');
    proposals.push({ id: id, path: fpath, content: content });
    replaced.push({ orig: match[0], id: id });
  }
  for (var i = 0; i < replaced.length; i++) {
    cleanedText = cleanedText.replace(replaced[i].orig, '\n[[PROPOSAL:' + replaced[i].id + ']]\n');
  }
  return { proposals: proposals, cleanedText: cleanedText };
}

function renderProposalCard(id, filePath, content, isNew) {
  var ext      = filePath.split('.').pop() || '';
  var lines    = content.split('\n');
  var preview  = lines.slice(0, 15).join('\n') + (lines.length > 15 ? '\n...' : '');
  var badge    = isNew ? '<span class="proposal-badge new">NEW FILE</span>'
                       : '<span class="proposal-badge edit">EDIT</span>';
  return (
    '<div class="file-proposal" id="proposal-' + id + '">' +
      '<div class="proposal-header">' +
        '<span class="proposal-icon">' + fileIcon(ext) + '</span>' +
        '<span class="proposal-path">' + escHtml(filePath) + '</span>' +
        badge +
      '</div>' +
      '<pre class="proposal-preview">' + escHtml(preview) + '</pre>' +
      '<div class="proposal-actions">' +
        '<button type="button" class="btn-accept" onclick="acceptProposal(\'' + id + '\')">' +
          '&#10003; Accept' +
        '</button>' +
        '<button type="button" class="btn-diff" onclick="diffProposal(\'' + id + '\')">' +
          '&#9636; View Diff' +
        '</button>' +
        '<button type="button" class="btn-reject" onclick="rejectProposal(\'' + id + '\')">' +
          '&#10005; Reject' +
        '</button>' +
      '</div>' +
    '</div>'
  );
}

function acceptProposal(id) {
  var card = document.getElementById('proposal-' + id);
  if (!card) { return; }
  var filePath = card.querySelector('.proposal-path').textContent;
  var content  = proposalContents[id] || '';
  card.querySelector('.btn-accept').disabled = true;
  vscode.postMessage({ type: 'acceptFile', id: id, path: filePath, content: content });
}

function diffProposal(id) {
  var card = document.getElementById('proposal-' + id);
  if (!card) { return; }
  var filePath = card.querySelector('.proposal-path').textContent;
  var content  = proposalContents[id] || '';
  vscode.postMessage({ type: 'viewDiff', id: id, path: filePath, content: content });
}

function rejectProposal(id) {
  var card = document.getElementById('proposal-' + id);
  if (!card) { return; }
  delete proposalContents[id];
  vscode.postMessage({ type: 'rejectFile', id: id });
  // Update UI
  var actionsEl = card.querySelector('.proposal-actions');
  if (actionsEl) { actionsEl.remove(); }
  var statusEl = document.createElement('div');
  statusEl.className = 'proposal-status rejected';
  statusEl.innerHTML = '&#10005; Rejected';
  card.appendChild(statusEl);
}

// Inject proposal cards into a rendered HTML string
function injectProposalCards(html, proposals) {
  var result = html;
  for (var i = 0; i < proposals.length; i++) {
    var p        = proposals[i];
    var marker   = escHtml('[[PROPOSAL:' + p.id + ']]');
    var cardHtml = renderProposalCard(p.id, p.path, proposalContents[p.id] || '', true);
    result = result.replace(marker, cardHtml);
    // Also try unescaped version (renderMarkdown wraps in <span>)
    result = result.replace('<span>[[PROPOSAL:' + p.id + ']]</span>', cardHtml);
  }
  return result;
}

// ── Markdown renderer ─────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  var BT3   = String.fromCharCode(96, 96, 96);
  var parts = [];
  var pos   = 0;
  while (pos < text.length) {
    var start = text.indexOf(BT3, pos);
    if (start === -1) { break; }
    if (start > pos) {
      parts.push('<span>' + escHtml(text.slice(pos, start)) + '</span>');
    }
    var nlPos     = text.indexOf('\n', start + 3);
    var lang      = nlPos === -1 ? '' : text.slice(start + 3, nlPos).trim();
    var codeStart = nlPos === -1 ? start + 3 : nlPos + 1;
    var end       = text.indexOf(BT3, codeStart);
    if (end === -1) { break; }
    var code    = text.slice(codeStart, end);
    var blockId = 'cb_' + Math.random().toString(36).slice(2);
    parts.push(
      '<div class="code-block">' +
        '<div class="code-header">' +
          '<span class="code-lang">' + escHtml(lang) + '</span>' +
          '<button class="code-copy" onclick="copyCode(\'' + blockId + '\')">&#128203; Copy code</button>' +
        '</div>' +
        '<div class="code-body"><pre id="' + blockId + '">' + escHtml(code) + '</pre></div>' +
      '</div>'
    );
    pos = end + 3;
  }
  if (pos < text.length) {
    parts.push('<span>' + escHtml(text.slice(pos)) + '</span>');
  }
  return parts.join('');
}

function copyCode(blockId) {
  var el = document.getElementById(blockId);
  if (!el) { return; }
  navigator.clipboard.writeText(el.textContent || '').then(function() {
    statusText.textContent = 'Code copied!';
    setTimeout(function() { statusText.textContent = lastStatus; }, 2000);
  });
}

function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

// ── Message rendering ─────────────────────────────────────────────────────────

function appendUserMsg(text, attached) {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg';
  var tagsHtml = '';
  if (attached && attached.length) {
    tagsHtml = '<div class="msg-attached">';
    for (var i = 0; i < attached.length; i++) {
      tagsHtml += '<span class="msg-tag"><span class="msg-tag-icon">' +
        fileIcon(attached[i].ext) + '</span>' + escHtml(attached[i].name) + '</span>';
    }
    tagsHtml += '</div>';
  }
  wrapper.innerHTML =
    '<div class="msg-label user">You</div>' +
    '<div class="msg-bubble user">' + tagsHtml + escHtml(text) + '</div>';
  chatEl.appendChild(wrapper);
  scrollBottom();
}

function startAiMsg() {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg';
  wrapper.innerHTML = '<div class="msg-label ai">AI</div>';
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble ai cursor';
  wrapper.appendChild(bubble);
  chatEl.appendChild(wrapper);
  currentAiBubble  = bubble;
  streamingRawText = '';
  scrollBottom();
}

function appendToken(token) {
  if (!currentAiBubble) { return; }
  streamingRawText += token;
  currentAiBubble.textContent = streamingRawText;
  scrollBottom();
}

function finalizeAiMsg(sources) {
  if (!currentAiBubble) { return; }
  currentAiBubble.classList.remove('cursor');

  // Phase 6: extract <file_write> proposals before rendering
  var extracted = extractProposals(streamingRawText);

  // Store proposal contents
  for (var i = 0; i < extracted.proposals.length; i++) {
    var p = extracted.proposals[i];
    proposalContents[p.id] = p.content;
  }

  // Render markdown (proposals replaced with [[PROPOSAL:id]] markers)
  var rendered = renderMarkdown(extracted.cleanedText);

  // Inject proposal cards in place of markers
  if (extracted.proposals.length > 0) {
    rendered = injectProposalCards(rendered, extracted.proposals);
    // Register with extension (for diff content provider)
    vscode.postMessage({ type: 'registerProposals', proposals: extracted.proposals });
  }

  currentAiBubble.innerHTML = rendered;

  if (sources && sources.length) {
    var src = document.createElement('div');
    src.className = 'sources';
    src.innerHTML = 'Sources: ' + sources.map(function(s) {
      return '[' + s.num + '] <a href="' + escHtml(s.url) + '" target="_blank">' + escHtml(s.title) + '</a>';
    }).join('  &middot;  ');
    currentAiBubble.parentElement.appendChild(src);
  }
  currentAiBubble = null;
  streamingRawText = '';
  scrollBottom();
}

function appendErrorMsg(msg) {
  if (currentAiBubble) {
    currentAiBubble.classList.remove('cursor');
    currentAiBubble.style.color = '#f38ba8';
    currentAiBubble.textContent = 'Error: ' + msg;
    currentAiBubble = null;
  }
  sendBtn.disabled = false;
}

// ── Send ──────────────────────────────────────────────────────────────────────

function sendMessage() {
  var text = inputEl.value.trim();
  if (!text && attachedFiles.length === 0) { return; }
  if (!text) { text = 'Please review the attached file(s).'; }

  var snapshot = attachedFiles.slice();
  inputEl.value = '';
  inputEl.style.height = '';
  sendBtn.disabled = true;
  attachedFiles = [];
  renderChips();

  appendUserMsg(text, snapshot);
  vscode.postMessage({
    type:          'chat',
    question:      text,
    attachedPaths: snapshot.map(function(f) { return f.absPath; }),
  });
}

sendBtn.addEventListener('click', sendMessage);

clearBtn.addEventListener('click', function() {
  chatEl.innerHTML = '';
  attachedFiles = [];
  renderChips();
  vscode.postMessage({ type: 'clear' });
});

topicInput.addEventListener('change', function() {
  vscode.postMessage({ type: 'setTopic', topic: topicInput.value.trim() });
});

// ── Messages from extension ───────────────────────────────────────────────────

var lastStatus     = 'Connecting...';
var reconnectBtn   = document.getElementById('reconnect-btn');

reconnectBtn.addEventListener('click', function() {
  statusText.textContent = 'Retrying\u2026';
  reconnectBtn.style.display = 'none';
  vscode.postMessage({ type: 'reconnect' });
});

window.addEventListener('message', function(event) {
  var msg = event.data;
  switch (msg.type) {

    case 'serverStatus':
      statusDot.className    = 'status-dot' + (msg.ok ? ' ok' : '');
      statusText.textContent = msg.message;
      lastStatus = msg.message;
      reconnectBtn.style.display = msg.ok ? 'none' : 'inline-block';
      break;

    case 'fileContext':
      fileBadge.textContent = msg.fileName
        ? msg.fileName + ' (' + (msg.chars / 1000).toFixed(1) + 'k)'
        : 'no file open';
      break;

    case 'setTopic':
      topicInput.value = msg.topic;
      if (msg.message) { statusText.textContent = msg.message; lastStatus = msg.message; }
      break;

    case 'setInput':
      inputEl.value = msg.value;
      inputEl.focus();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      break;

    case 'fileList':
      allFiles = msg.files || [];
      if (pickerOpen) { renderPicker(pickerInput.value); }
      break;

    case 'startResponse':
      startAiMsg();
      break;

    case 'token':
      appendToken(msg.token);
      break;

    case 'done':
      finalizeAiMsg(msg.sources);
      sendBtn.disabled = false;
      break;

    case 'error':
      appendErrorMsg(msg.message);
      break;

    case 'fileWritten': {
      var card2 = document.getElementById('proposal-' + msg.id);
      if (card2) {
        var actions2 = card2.querySelector('.proposal-actions');
        if (actions2) { actions2.remove(); }
        var statusEl2 = document.createElement('div');
        statusEl2.className = 'proposal-status accepted';
        statusEl2.innerHTML = '&#10003; Accepted &mdash; <span style="font-family:Consolas,monospace">' + escHtml(msg.path) + '</span>';
        card2.appendChild(statusEl2);
        delete proposalContents[msg.id];
      }
      break;
    }

    case 'fileError': {
      var card3 = document.getElementById('proposal-' + msg.id);
      if (card3) {
        var btn3 = card3.querySelector('.btn-accept');
        if (btn3) { btn3.disabled = false; }
        var statusEl3 = document.createElement('div');
        statusEl3.className = 'proposal-status error';
        statusEl3.textContent = 'Error: ' + msg.message;
        card3.appendChild(statusEl3);
      }
      break;
    }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
vscode.postMessage({ type: 'ready' });
// Pre-load file list immediately so @ is instant
vscode.postMessage({ type: 'getFiles' });
inputEl.focus();
</script>
